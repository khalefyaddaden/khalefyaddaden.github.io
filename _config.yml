# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Khalef Yaddaden
email: k.yaddaden@zohomail.eu
shortbio:
  en: "Khalef Yaddaden is a doctorant at the university of Strasbourg. Under the supervision
  of Benjamin Enriquez, he works on the geometric interpretation of double shuffle
  relations of special values of multiple polylogarithms. His main interests are
  Hopf algebras, group schemes and Lie algebras."
  fr: "Khalef Yaddaden est doctorant à l'université de Strasbourg. Sous la direction
  de Benjamin Enriquez, il travaille sur l'interprétation géométrique des relations
  de double mélange de valeurs spéciales de polylogarithmes multiples. Il s'intéresse
  principalement aux algèbres de Hopf, les schémas de groupe et les algèbres de Lie."
description: #>- # this means to ignore newlines until "baseurl:"
  en: "Welcome to Khalef Yaddaden's official webpage."
  fr: "Bienvenue sur le site officiel de Khalef Yaddaden."

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://khalefyaddaden.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: YaddadenK
github_username:  khalefyaddaden
linkedin_username: khalef-yaddaden-ab558a166

langs: ["en", "fr"]
defaults:
  - scope:
      path: ""
    values:
      lang: "en"

# Build settings
theme: academic
plugins:
  - jekyll-feed

